<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%2305050a'/%3E%3Ctext y='72' x='10' font-size='60' font-family='monospace' fill='%2300ff88'%3E%3E_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <style>
    .err-hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .err-code {
      font-family: var(--mono);
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 60px rgba(0,255,136,0.25);
      letter-spacing: -4px;
    }
    .err-label {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0.8rem 0 2rem;
    }
    .err-terminal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.8rem;
      font-family: var(--mono);
      font-size: 0.82rem;
      text-align: left;
      margin-bottom: 2.5rem;
      max-width: 420px;
      width: 100%;
    }
    .err-terminal p { margin: 0.2rem 0; }
    .err-red { color: #ff4f6d; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">CV</a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="apropos.html">À propos</a></li>
      <li><a href="projets.html">Projets</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="err-hero">
    <div class="err-code fade-in d1">404</div>
    <p class="err-label fade-in d2">Page introuvable</p>

    <div class="err-terminal fade-in d3">
      <p><span class="t-prompt">~$</span> GET <span class="t-val">{{ page }}</span></p>
      <p class="err-red">Error: 404 Not Found</p>
      <p class="t-dim">La page que vous cherchez n'existe pas.</p>
      <p><span class="t-prompt">~$</span> cd ~<span class="t-cursor"></span></p>
    </div>

    <div class="hero-actions fade-in d4">
      <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
      <a href="projets.html" class="btn btn-ghost">Voir les projets</a>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p>© 2026 Charlie Costa-Roy</p>
      <div class="footer-links">
        <a href="https://github.com/omeeega" target="_blank" rel="noopener">GitHub</a>
        <a href="mailto:charlie.roycosta@gmail.com">Email</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
